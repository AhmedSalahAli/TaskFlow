name: iOS CI

on:
push:
branches: [ main ]
pull_request:

jobs:
build-and-test:
runs-on: macos-latest


steps:
  - name: Checkout
    uses: actions/checkout@v4

  - name: Select Xcode
    run: sudo xcode-select -switch /Applications/Xcode.app

  - name: Build
    run: |
      xcodebuild \
      -scheme TaskFlow \
      -destination 'platform=iOS Simulator,name=iPhone 14,OS=latest' \
      clean build

  - name: Run Tests
    run: |
      xcodebuild \
      -scheme TaskFlow \
      -destination 'platform=iOS Simulator,name=iPhone 14,OS=latest' \
      test
