name: iOS CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:

jobs:
  build-test-deploy:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16.4
        run: sudo xcode-select -switch /Applications/Xcode_16.4.app

      # -----------------------
      # Ruby
      # -----------------------
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: false

      # -----------------------
      # Install Gems
      # -----------------------
      - name: Install Gems
        run: bundle install

      # -----------------------
      # Install Certificates (MATCH)
      # -----------------------
      - name: Install Certificates
        run: bundle exec fastlane match appstore --readonly
        env:
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}

      # -----------------------
      # Resolve Packages
      # -----------------------
      - name: Resolve Swift Packages
        run: xcodebuild -resolvePackageDependencies -project TaskFlow.xcodeproj

      # -----------------------
      # Build
      # -----------------------
      - name: Build
        run: |
          xcodebuild \
          -scheme TaskFlow \
          -project TaskFlow.xcodeproj \
          -destination 'platform=iOS Simulator,name=iPhone 16,OS=18.5' \
          -sdk iphonesimulator \
          -configuration Debug \
          clean build \
          CODE_SIGNING_ALLOWED=NO

      # -----------------------
      # Test
      # -----------------------
      - name: Run Tests
        run: |
          xcodebuild \
          -scheme TaskFlow \
          -project TaskFlow.xcodeproj \
          -destination 'platform=iOS Simulator,name=iPhone 16,OS=18.5' \
          -sdk iphonesimulator \
          -configuration Debug \
          test \
          CODE_SIGNING_ALLOWED=NO

      # -----------------------
      # Deploy → TestFlight (develop)
      # -----------------------
      - name: Deploy to TestFlight
        if: github.ref == 'refs/heads/develop'
        run: bundle exec fastlane beta
        env:
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          FASTLANE_USER: ahmedsalahali2@gmail.com

      # -----------------------
      # Deploy → App Store (main)
      # -----------------------
      - name: Deploy to App Store
        if: github.ref == 'refs/heads/main'
        run: bundle exec fastlane release
        env:
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          FASTLANE_USER: ahmedsalahali2@gmail.com
