name: iOS CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build-and-test:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16.4
        run: sudo xcode-select -switch /Applications/Xcode_16.4.app

      - name: Resolve Swift Packages
        run: xcodebuild -resolvePackageDependencies -project TaskFlow.xcodeproj

      - name: Build
        run: |
          xcodebuild \
          -scheme TaskFlow \
          -project TaskFlow.xcodeproj \
          -destination 'platform=iOS Simulator,name=iPhone 14,OS=17.5' \
          -sdk iphonesimulator \
          -configuration Debug \
          clean build \
          CODE_SIGNING_ALLOWED=NO

      - name: Run Tests
        run: |
          xcodebuild \
          -scheme TaskFlow \
          -project TaskFlow.xcodeproj \
          -destination 'platform=iOS Simulator,name=iPhone 14,OS=17.5' \
          -sdk iphonesimulator \
          -configuration Debug \
          test \
          CODE_SIGNING_ALLOWED=NO
