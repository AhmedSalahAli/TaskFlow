name: iOS CI/CD

on:
  push:
    branches:
      - main
      - develop
  pull_request:

jobs:
  build-test-deploy:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16.4
        run: sudo xcode-select -switch /Applications/Xcode_16.4.app

      - name: Resolve Swift Packages
        run: xcodebuild -resolvePackageDependencies -project TaskFlow.xcodeproj

      # -----------------------
      # BUILD + TEST (CI)
      # -----------------------
      - name: Build
        run: |
          xcodebuild \
          -scheme TaskFlow \
          -project TaskFlow.xcodeproj \
          -destination 'platform=iOS Simulator,name=iPhone 16,OS=18.5' \
          -sdk iphonesimulator \
          -configuration Debug \
          clean build \
          CODE_SIGNING_ALLOWED=NO

      - name: Run Tests
        run: |
          xcodebuild \
          -scheme TaskFlow \
          -project TaskFlow.xcodeproj \
          -destination 'platform=iOS Simulator,name=iPhone 16,OS=18.5' \
          -sdk iphonesimulator \
          -configuration Debug \
          test \
          CODE_SIGNING_ALLOWED=NO

      # -----------------------
      # FASTLANE (CD)
      # -----------------------
      - name: Install Fastlane
        if: github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main'
        run: brew install fastlane

      - name: Set App Store Password
        if: github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main'
        run: echo "FASTLANE_APPLE_APPLICATION_SPECIFIC_PASSWORD=${{ secrets.APP_STORE_PASSWORD }}" >> $GITHUB_ENV

      # -----------------------
      # TESTFLIGHT (develop)
      # -----------------------
      - name: Deploy to TestFlight
        if: github.ref == 'refs/heads/develop'
        run: fastlane beta

      # -----------------------
      # PRODUCTION (main)
      # -----------------------
      - name: Deploy to App Store
        if: github.ref == 'refs/heads/main'
        run: fastlane release
